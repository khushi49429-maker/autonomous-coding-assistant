<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMentor AI - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

    <h1>CodeMentor AI</h1>

    <div class="form-box">

        <h2>Login</h2>

        <input
            type="email"
            id="login-email"
            placeholder="Email"
        >

        <input
            type="password"
            id="login-password"
            placeholder="Password"
        >

        <button onclick="login()">
            Login
        </button>

        <hr>

        <h2>Create Account</h2>

        <input
            type="text"
            id="signup-username"
            placeholder="Username"
        >

        <input
            type="email"
            id="signup-email"
            placeholder="Email"
        >

        <input
            type="password"
            id="signup-password"
            placeholder="Password"
        >

        <button onclick="signup()">
            Sign Up
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
